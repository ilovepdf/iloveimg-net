name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0'
          
      - name: Get version from release
        id: get_version
        run: echo "##[set-output name=VERSION;]${{ github.event.release.tag_name }}"

      - name: Set version in .csproj
        run: |
          sed -i 's/<Version>.*<\/Version>/<Version>${{ steps.get_version.outputs.VERSION }}<\/Version>/g' **/*.csproj
          
      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --no-restore --verbosity normal

      - name: Pack NuGet package
        run: dotnet pack ./iLoveIMG/iLoveIMG.csproj --configuration Release --output ./nupkg

      - name: List all files in working directory
        run: ls -R

      - name: Print working directory
        run: pwd

      - name: Publish to NuGet
        run: dotnet nuget push ./*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source nuget.org
